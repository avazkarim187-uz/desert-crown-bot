version: "3.9"

services:
  bot:
    build: .
    container_name: dessert-crown-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # DB va yuklangan rasmlar saqlanadigan joy
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import sqlite3; sqlite3.connect('/app/data/bot.db').execute('SELECT 1')"]
      interval: 60s
      timeout: 5s
      retries: 3
